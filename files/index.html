<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Picks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f9f9f7;
      --text:   #111;
      --muted:  #999;
      --line:   #e5e5e5;
      --accent: #111;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.6;
    }

    header {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 2rem 2rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }

    .site-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .site-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .controls {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid var(--line);
    }

    .search-input {
      background: none;
      border: none;
      border-bottom: 1px solid var(--line);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: var(--text);
      padding: 0.3rem 0;
      width: 200px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--text); }
    .search-input::placeholder { color: var(--muted); }

    .btn {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }

    .btn:hover { color: var(--text); }
    .btn.active { color: var(--text); text-decoration: underline; }

    .sep { color: var(--line); }

    .count {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
    }

    .list {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    .card {
      display: grid;
      grid-template-columns: 40px 120px 1fr auto;
      align-items: start;
      gap: 1rem;
      padding: 1.4rem 0;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .card:hover { opacity: 0.7; }

    .card.selected .card-title {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .card-num {
      font-size: 12px;
      color: var(--muted);
      padding-top: 2px;
    }

    .card-image {
      width: 120px;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      border: 1px solid var(--line);
      background: #fff;
    }

    .card-body {
      min-width: 0;
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      max-width: 560px;
    }

    .card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
      padding-top: 2px;
    }

    .card-tag {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .card-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .card-link:hover { color: var(--text); }

    .empty {
      padding: 3rem 0;
      font-size: 13px;
      color: var(--muted);
    }

    footer {
      max-width: 960px;
      margin: 0 auto;
      padding: 1rem 2rem;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 720px) {
      .card {
        grid-template-columns: 32px 1fr;
        gap: 0.75rem;
      }

      .card-body,
      .card-image,
      .card-right {
        grid-column: 2;
      }

      .card-body {
        grid-row: auto;
      }

      .card-right {
        flex-direction: row;
        align-items: flex-start;
        gap: 0.75rem;
        padding-top: 0;
      }

      .card-tag,
      .card-link {
        line-height: 1.2;
      }
    }
  </style>
</head>
<body>

  <header>
    <span class="site-title">Movie Picks</span>
    <span class="site-meta">SDT 104 / HW-11 — Slipchenko Illia</span>
  </header>

  <div class="controls">
    <input class="search-input" id="searchInput" type="text" placeholder="Filter..." />
    <span class="sep">·</span>
    <button class="btn" id="sortBtn">Sort A–Z</button>
    <span class="sep">·</span>
    <button class="btn" id="resetBtn">Reset</button>
    <span class="count" id="countEl"></span>
  </div>

  <div class="list" id="cardsList"></div>

  <footer>
    <span>Spring 2026 / Dr. Kolesnikov</span>
    <span id="charCount"></span>
  </footer>

  <script src="cards.js"></script>
</body>
</html>
